services:
  app:
    build: .
    container_name: typegrid_backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - MONGO_URL=mongodb://mongo:27017/typegrid 
      - REDIS_HOST=redis 
    depends_on:
      - mongo
      - redis
    command: npm run dev

  mongo:
    image: mongo
    container_name: mongodb
    # ports:
    #   - "27017:27017"

  redis:
    image: redis
    container_name: redis_server
    # ports:
    #   - "6379:6379"